<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuthCore - Developer Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view-hidden { display: none !important; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <div id="view-login" class="view-hidden flex-1 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-100">
            <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6"><i class="fa-solid fa-shield-halved mr-2"></i>AuthCore Login</h2>
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="login-username" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="login-password" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <button type="submit" id="btn-login" class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-md transition duration-200">
                    Log In
                </button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">
                Need an API key? <button onclick="switchView('view-signup')" class="font-medium text-indigo-600 hover:text-indigo-500">Sign up</button>
            </p>
        </div>
    </div>

    <div id="view-signup" class="view-hidden flex-1 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-100">
            <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6"><i class="fa-solid fa-user-plus mr-2"></i>Create Account</h2>
            <form id="form-signup" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="signup-username" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="signup-password" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <button type="submit" id="btn-signup" class="w-full py-2 px-4 bg-gray-800 hover:bg-gray-900 text-white font-medium rounded-md transition duration-200">
                    Create Developer Account
                </button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-600">
                Already have an account? <button onclick="switchView('view-login')" class="font-medium text-indigo-600 hover:text-indigo-500">Log in</button>
            </p>
        </div>
    </div>

    <div id="view-dashboard" class="view-hidden flex-1 flex flex-col h-full bg-gray-50">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 shadow-sm">
            <div class="flex items-center text-xl font-bold text-indigo-600">
                <i class="fa-solid fa-shield-halved mr-2"></i>AuthCore Portal
            </div>
            <div class="flex items-center space-x-6">
                <span class="font-medium text-gray-700"><i class="fa-solid fa-user mr-2 text-gray-400"></i><span id="dash-username">Loading...</span></span>
                <button onclick="logout()" class="text-sm font-medium text-red-600 hover:text-red-800"><i class="fa-solid fa-right-from-bracket mr-1"></i>Logout</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 flex justify-center">
            <div class="max-w-3xl w-full">
                <h2 class="text-2xl font-bold text-gray-900 mb-1">API Credentials</h2>
                <p class="text-gray-500 mb-8">Manage your secret keys to authenticate requests to the AuthCore API.</p>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="px-6 py-5 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800">Live Secret Key</h3>
                        </div>
                        <button onclick="generateKey()" id="btn-generate" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg shadow transition-colors flex items-center">
                            <i class="fa-solid fa-rotate mr-2"></i> Roll Key
                        </button>
                    </div>
                    
                    <div class="p-6">
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Your Token</label>
                        <div class="flex items-center bg-gray-100 rounded-lg border border-gray-200 p-1">
                            <input type="text" id="api-key-display" readonly class="w-full bg-transparent border-none text-gray-700 font-mono text-sm px-3 py-2 focus:outline-none" value="Loading...">
                            <button onclick="copyKey()" class="p-2 text-gray-500 hover:text-indigo-600 transition-colors mx-1" title="Copy to clipboard">
                                <i class="fa-regular fa-copy text-lg"></i>
                            </button>
                        </div>
                        <p class="text-xs text-amber-600 mt-3 flex items-center">
                            <i class="fa-solid fa-triangle-exclamation mr-1"></i> Rolling your key immediately invalidates the old one.
                        </p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 flex flex-col space-y-3 z-50"></div>

    <script>
        const API_URL = 'https://authentication-module-3.onrender.com';

        // --- 1. SPA ROUTING ENGINE ---
        function switchView(viewId) {
            // Hide all views
            document.getElementById('view-login').classList.add('view-hidden');
            document.getElementById('view-signup').classList.add('view-hidden');
            document.getElementById('view-dashboard').classList.add('view-hidden');
            
            // Show the target view
            document.getElementById(viewId).classList.remove('view-hidden');
        }

        // --- 2. INITIALIZATION CHECK ---
        function checkAuthState() {
            const token = localStorage.getItem('auth_token');
            if (token) {
                switchView('view-dashboard');
                loadDashboardData(token);
            } else {
                switchView('view-login');
            }
        }

        // --- 3. DASHBOARD DATA FETCHING ---
        async function loadDashboardData(token) {
            try {
                const res = await fetch(`${API_URL}/dashboard/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('dash-username').innerText = data.username;
                    document.getElementById('api-key-display').value = data.apiKey || "No key generated yet.";
                } else {
                    logout(); // Token expired or invalid
                }
            } catch (err) {
                showToast("Cannot reach API server.", "error");
                document.getElementById('api-key-display').value = "Server offline.";
            }
        }

        // --- 4. FORM HANDLERS ---
        // SIGNUP
        document.getElementById('form-signup').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-signup');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Creating...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('signup-username').value,
                        password: document.getElementById('signup-password').value
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    showToast("Account created! Please log in.", "success");
                    document.getElementById('form-signup').reset();
                    switchView('view-login');
                } else {
                    showToast(data.error, "error");
                }
            } catch (err) {
                showToast("Network error.", "error");
            } finally {
                btn.innerHTML = 'Create Developer Account';
                btn.disabled = false;
            }
        });

        // LOGIN
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Logging in...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('login-username').value,
                        password: document.getElementById('login-password').value
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('auth_token', data.token);
                    document.getElementById('form-login').reset();
                    showToast("Welcome back!", "success");
                    checkAuthState(); // Triggers the router to show dashboard
                } else {
                    showToast(data.error, "error");
                }
            } catch (err) {
                showToast("Network error.", "error");
            } finally {
                btn.innerHTML = 'Log In';
                btn.disabled = false;
            }
        });

        // GENERATE API KEY
        async function generateKey() {
            const token = localStorage.getItem('auth_token');
            const btn = document.getElementById('btn-generate');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Generating...`;
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/dashboard/generate-key`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('api-key-display').value = data.apiKey;
                    showToast("New API Key generated!", "success");
                } else {
                    logout(); 
                }
            } catch (err) {
                showToast("Network error", "error");
            } finally {
                btn.innerHTML = `<i class="fa-solid fa-rotate mr-2"></i> Roll Key`;
                btn.disabled = false;
            }
        }

        // --- 5. UTILITIES ---
        function logout() {
            localStorage.removeItem('auth_token');
            checkAuthState(); // Triggers router to show login screen
            showToast("Logged out successfully.", "success");
        }

        function copyKey() {
            const copyText = document.getElementById("api-key-display");
            if (copyText.value.includes("No key generated") || copyText.value.includes("offline")) {
                return showToast("Generate a valid key first!", "error");
            }
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value);
            showToast("Copied to clipboard!", "success");
        }

        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === "success" ? "bg-gray-800" : "bg-red-600";
            const icon = type === "success" ? "fa-circle-check text-green-400" : "fa-circle-xmark text-white";

            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center space-x-3 toast-enter`;
            toast.innerHTML = `<i class="fa-solid ${icon}"></i><span class="font-medium text-sm">${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Boot up the application!
        checkAuthState();
    </script>
</body>
</html>
