<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Startup Dashboard</title>
</head>
<body style="font-family: sans-serif; padding: 50px;">

    <h2>Welcome to my App!</h2>
    <p>Please log in to continue.</p>

    <div id="login-container"></div>

    <script src="https://cdn.jsdelivr.net/gh/Arnab-Pachal1234/my-auth-widget@v1.0.0/auth-widget.js"></script>

    <script>
        const auth = new MyAuthWidget({
            containerId: 'login-container',
            apiUrl: 'http://localhost:3000', // Pointing to your local Node.js server
            onSuccess: function(data) {
                alert("It works! You are logged in.");
                console.log(data);
            }
        });

        // Tell the widget to render on the screen
        auth.mount();
    </script>

</body>
</html>
